services:
    # Expose Postgres for DB GUI tools (TablePlus, DBeaver)
    postgres:
        ports:
            - "5432:5432"

    # Expose Redis for inspection (RedisInsight)
    redis:
        ports:
            - "6379:6379"

    # pgAdmin — Postgres GUI
    pgadmin:
        image: dpage/pgadmin4:latest
        container_name: neema_pgadmin
        restart: unless-stopped
        environment:
            PGADMIN_DEFAULT_EMAIL: webmaster@bethanyhouse.co.ke
            PGADMIN_DEFAULT_PASSWORD: '#MJpgp@20100#'
            PGADMIN_CONFIG_SERVER_MODE: "False"
            PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
        ports:
            - "5051:80"
        depends_on:
            - postgres
        networks:
            - neema_net

    # FastAPI — hot reload with uvicorn --reload
    api:
        build:
            context: ./apps/api
            target: builder
        command: >
            sh -c "python -m alembic upgrade head &&
                   python -c 'import asyncio; from app.seeds import run_seeds; asyncio.run(run_seeds())' &&
                   uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
        volumes:
            - ./apps/api:/app
            - neema_media:/var/neema/media
        environment:
            ENVIRONMENT: development
        ports:
            - "8000:8000"
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/api/health'')"',
                ]
            interval: 15s
            timeout: 5s
            retries: 10
            start_period: 60s

    # Next.js — dev server
    web:
        build:
            context: ./apps/web
            target: deps
        command: pnpm run dev
        volumes:
            - ./apps/web:/app
            - web_node_modules:/app/node_modules
        environment:
            NODE_ENV: development
        ports:
            - "3000:3000"

    # n8n — expose editor UI directly
    # n8n:
    #     ports:
    #         - "5678:5678"

volumes:
    web_node_modules:
    neema_media:
