worker_processes auto;
events { worker_connections 2048; }

http {
    include      mime.types;
    default_type application/octet-stream;

    # Use Docker's internal DNS resolver
    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;

    sendfile on;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Use variables so nginx resolves lazily (won't fail if upstream is down at start)
        set $api_upstream http://api:8000;
        set $web_upstream http://web:3000;
        set $n8n_upstream http://n8n:5678;

        location /api/ {
            proxy_pass         $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /ws {
            proxy_pass         $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_read_timeout 86400s;
        }

        location /n8n/ {
            proxy_pass         $n8n_upstream/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass         $web_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}