name: Build & Push

# CI builds both images and pushes them to GHCR. It does NOT deploy — the VPS
# pulls new images itself on a systemd timer (scripts/box-deploy.sh), because
# this box's host firewall intermittently drops GitHub-runner IPs on port 22,
# which made an Actions->box SSH push unreliable. Outbound-from-box pulls are
# not affected, so the box-pull model is robust. Deploy lands within ~2 min of
# a successful push here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/mosesmwicigi24-pixel/neema-ai-api
  WEB_IMAGE: ghcr.io/mosesmwicigi24-pixel/neema-ai-web
  NEXT_PUBLIC_API_URL: https://neema.bethanyhouse.co.ke/api
  NEXT_PUBLIC_WS_URL: ws://neema.bethanyhouse.co.ke

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          target: runner
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          target: runner
          push: ${{ github.event_name == 'push' }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ env.NEXT_PUBLIC_WS_URL }}
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
