# ─── Named Volumes ────────────────────────────────────────
volumes:
    postgres_data:
    redis_data:
    pgadmin_data:
    # n8n_data:

# ─── Bridge Network ───────────────────────────────────────
networks:
    neema_net:
        driver: bridge
