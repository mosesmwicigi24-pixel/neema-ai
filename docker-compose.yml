#version: '3.9'

services:
    # ─── PostgreSQL 16 ─────────────────────────────────────
    postgres:
        image: postgres:16-alpine
        container_name: neema_postgres
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - neema_net
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 15s

    # ─── Redis 7 ────────────────────────────────────────────
    redis:
        image: redis:7-alpine
        container_name: neema_redis
        restart: unless-stopped
        command: >
            redis-server
            --appendonly yes
            --maxmemory 256mb
            --maxmemory-policy allkeys-lru
        volumes:
            - redis_data:/data
        networks:
            - neema_net
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 3s
            retries: 5

    # ─── pgAdmin ─────────────────────────────────────────────
    pgadmin:
        image: dpage/pgadmin4:latest
        container_name: neema_pgadmin
        restart: unless-stopped
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
            PGADMIN_CONFIG_SERVER_MODE: "False"
            PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
        volumes:
            - pgadmin_data:/var/lib/pgadmin
        depends_on:
            - postgres
        networks:
            - neema_net
        ports:
            - "127.0.0.1:5050:80"

    # ─── FastAPI ─────────────────────────────────────────────
    api:
        build:
            context: ./apps/api
            dockerfile: Dockerfile
            target: runner
        container_name: neema_api
        restart: unless-stopped
        env_file: .env
        environment:
            ENVIRONMENT: production
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - neema_net
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'python -c "import httpx; httpx.get(''http://localhost:8000/api/health'').raise_for_status()"',
                ]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 40s # allow time for alembic upgrade head to run

    # ─── Next.js Admin UI ───────────────────────────────────
    web:
        build:
            context: ./apps/web
            dockerfile: Dockerfile
            target: runner
            args:
                NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
                NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        container_name: neema_web
        restart: unless-stopped
        env_file: .env
        environment:
            NODE_ENV: production
            API_INTERNAL_URL: http://api:8000
        depends_on:
            api:
                condition: service_healthy
        networks:
            - neema_net
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 30s

    # ─── Nginx ──────────────────────────────────────────────
    nginx:
        image: nginx:1.27-alpine
        container_name: neema_nginx
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./nginx/certs:/etc/nginx/certs:ro
        depends_on:
            api:
                condition: service_healthy
            web:
                condition: service_healthy
        networks:
            - neema_net

    # ─── n8n Automation ─────────────────────────────────────
    # n8n:
    #     image: n8nio/n8n:latest
    #     container_name: neema_n8n
    #     restart: unless-stopped
    #     env_file: .env
    #     environment:
    #         N8N_HOST: ${N8N_HOST}
    #         N8N_PORT: 5678
    #         N8N_PROTOCOL: https
    #         WEBHOOK_URL: ${WEBHOOK_URL}
